[tool.pytest.ini_options]
testpaths = ["tests"]
# pytest를 직접 실행해도(CI 등) 프로젝트 루트에서 Module 패키지를 찾도록 함
pythonpath = ["."]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # 라인 길이는 line-length로만 제어
]
