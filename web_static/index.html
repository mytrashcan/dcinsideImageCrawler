<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자짤 갤러리 · dcselfie</title>
  <meta name="description" content="DCInside 갤러리에서 모은 자짤(셀카·짤방)을 실시간으로 보여주는 핀터레스트형 피드. 일정 시간이 지나면 자동으로 사라집니다." />

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4317936564749286"
          crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-4317936564749286" />

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 16px;
    }
    header .brand { display: flex; align-items: baseline; min-width: 0; }
    header .logo {
      font-weight: 700;
      font-size: 20px;
    }
    header .subtitle {
      font-size: 13px;
      color: #767676;
      margin-left: 8px;
    }
    header .actions button {
      background: #e60023;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    header .actions { display: flex; align-items: center; gap: 16px; }
    header .actions a {
      color: #333;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
    header .actions a:hover { color: #e60023; text-decoration: underline; }
    header .actions button:hover { background: #ad001b; }
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      header .logo { font-size: 18px; }
      header .subtitle { display: none; }
      header .actions {
        width: 100%;
        justify-content: flex-start;
        gap: 14px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      header .actions a { font-size: 13px; }
      header .actions button {
        margin-left: auto;
        padding: 7px 14px;
        font-size: 13px;
      }
    }
    footer {
      text-align: center;
      padding: 28px 24px 40px;
      color: #767676;
      font-size: 13px;
    }
    footer a { color: #767676; text-decoration: none; }
    footer a:hover { color: #e60023; text-decoration: underline; }
    footer span { margin: 0 6px; }
    .masonry {
      column-count: 5;
      column-gap: 16px;
      padding: 16px 24px;
    }
    @media (max-width: 1200px) { .masonry { column-count: 4; } }
    @media (max-width: 900px)  { .masonry { column-count: 3; } }
    @media (max-width: 600px)  { .masonry { column-count: 2; } }

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      display: block;
    }
    .card .meta {
      padding: 10px 12px;
      font-size: 13px;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card .meta .time {
      color: #767676;
      font-size: 12px;
      white-space: nowrap;
      margin-left: 8px;
    }
    .card .meta .title {
      color: #111;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card .meta .title:hover { text-decoration: underline; color: #e60023; }
    .card .meta-right { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .card .likes {
      color: #e60023;
      font-size: 12px;
      font-weight: 700;
      user-select: none;
    }
    .card .imgwrap { position: relative; }
    .card .imgwrap img { -webkit-user-select: none; user-select: none; }
    .heart-pop {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      font-size: 84px;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      pointer-events: none;
      opacity: 0;
      animation: heartPop .8s ease-out forwards;
    }
    @keyframes heartPop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
      25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
      45%  { transform: translate(-50%,-50%) scale(0.95); }
      70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-60%) scale(1); }
    }
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #767676;
    }
    #gate {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #gate .gate-box {
      text-align: center;
      padding: 32px;
    }
    #gate .gate-logo { font-size: 24px; font-weight: 700; }
    #gate p { color: #767676; margin: 10px 0 22px; }
    #ts-widget { display: flex; justify-content: center; min-height: 65px; }
  </style>
</head>
<body>
  <div id="gate">
    <div class="gate-box">
      <div class="gate-logo">자짤 갤러리</div>
      <p>잠시만요, 사람인지 확인하고 있어요</p>
      <div id="ts-widget"></div>
    </div>
  </div>
  <header>
    <div class="brand">
      <span class="logo">자짤 갤러리</span>
      <span class="subtitle">DCInside 자짤 피드</span>
    </div>
    <nav class="actions">
      <a href="/request">갤러리 추가 요청</a>
      <a href="/about">소개</a>
      <a href="/privacy">개인정보처리방침</a>
      <button onclick="scrollToTop()">맨 위로</button>
    </nav>
  </header>
  <main id="gallery" class="masonry"></main>
  <footer>
    <a href="/request">갤러리 추가 요청</a>
    <span>·</span>
    <a href="/about">소개</a>
    <span>·</span>
    <a href="/privacy">개인정보처리방침</a>
    <span>·</span>
    <span>© <span id="year"></span> dcselfie.win</span>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    const gallery = document.getElementById('gallery');
    const cards = new Map(); // id -> card element (증분 렌더용)

    function timeAgo(epoch) {
      const diff = Math.floor((Date.now() / 1000) - epoch);
      if (diff < 60) return '방금';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return `${Math.floor(diff / 86400)}일 전`;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function makeCard(it) {
      const article = document.createElement('article');
      article.className = 'card';
      article.dataset.createdAt = it.created_at;
      article.dataset.id = it.id;
      const label = it.title || '자짤';
      const likes = it.likes || 0;
      const titleHtml = it.link
        ? `<a class="title" href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`
        : `<span class="title">${escapeHtml(label)}</span>`;
      const heart = localStorage.getItem('liked_' + it.id) ? '♥' : '♡';
      article.innerHTML = `
        <div class="imgwrap">
          <img src="${it.url}" alt="${escapeHtml(label)}" loading="lazy" />
        </div>
        <div class="meta">
          ${titleHtml}
          <span class="meta-right">
            <span class="likes"><span class="hi">${heart}</span> <b class="lc">${likes}</b></span>
            <span class="time">${timeAgo(it.created_at)}</span>
          </span>
        </div>`;
      return article;
    }

    function setEmpty(show) {
      const existing = gallery.querySelector('.empty');
      if (show && !existing) {
        gallery.innerHTML = '<div class="empty">아직 업로드된 자짤이 없습니다. 봇이 새 이미지를 수집하기 시작하면 여기에 표시됩니다.</div>';
      } else if (!show && existing) {
        existing.remove();
      }
    }

    function sync(items) {
      const ids = new Set(items.map(i => i.id));

      // 사라진(만료된) 이미지는 DOM에서 제거
      for (const [id, el] of cards) {
        if (!ids.has(id)) { el.remove(); cards.delete(id); }
      }

      // 새 이미지만 추가 (피드는 최신순 → 오래된 새 항목부터 prepend 하면 최신이 맨 위)
      const fresh = items.filter(i => !cards.has(i.id));
      for (let k = fresh.length - 1; k >= 0; k--) {
        const el = makeCard(fresh[k]);
        gallery.prepend(el);
        cards.set(fresh[k].id, el);
      }

      // 기존 카드의 '~분 전' + 좋아요 수 갱신 (다른 사람이 누른 것도 반영, 감소는 안 함)
      const byId = new Map(items.map(i => [i.id, i]));
      for (const [id, el] of cards) {
        const t = el.querySelector('.time');
        if (t) t.textContent = timeAgo(Number(el.dataset.createdAt));
        const lc = el.querySelector('.lc');
        const it = byId.get(id);
        if (lc && it) lc.textContent = Math.max(Number(lc.textContent) || 0, it.likes || 0);
      }

      setEmpty(cards.size === 0);
    }

    function popHeart(card) {
      const wrap = card.querySelector('.imgwrap') || card;
      const h = document.createElement('div');
      h.className = 'heart-pop';
      h.textContent = '❤';
      wrap.appendChild(h);
      setTimeout(() => h.remove(), 800);
    }

    function likeCard(card) {
      popHeart(card);
      const id = card.dataset.id;
      if (!id || localStorage.getItem('liked_' + id)) return; // 이미 누른 이미지는 애니메이션만
      localStorage.setItem('liked_' + id, '1');
      const hi = card.querySelector('.hi');
      if (hi) hi.textContent = '♥';
      const lc = card.querySelector('.lc');
      if (lc) lc.textContent = (Number(lc.textContent) || 0) + 1; // 낙관적 갱신
      fetch('/like/' + encodeURIComponent(id), { method: 'POST' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && lc) lc.textContent = d.likes; })
        .catch(() => {});
    }

    // 더블클릭 / 모바일 더블탭으로 좋아요
    gallery.addEventListener('dblclick', e => {
      const card = e.target.closest('.card');
      if (card) likeCard(card);
    });
    let lastTap = 0, lastCard = null;
    gallery.addEventListener('touchend', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const now = Date.now();
      if (now - lastTap < 300 && lastCard === card) { e.preventDefault(); likeCard(card); lastTap = 0; }
      else { lastTap = now; lastCard = card; }
    });

    async function loadFeed() {
      try {
        const res = await fetch('/feed?limit=200');
        sync(await res.json());
      } catch (e) {
        console.error('feed load failed', e);
      }
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 초기 로드 + 5초마다 증분 갱신 (ephemeral 피드) ──
    let feedStarted = false;
    function startFeed() {
      if (feedStarted) return;
      feedStarted = true;
      const gate = document.getElementById('gate');
      if (gate) gate.remove();
      loadFeed();
      setInterval(loadFeed, 5000);
    }

    // Cloudflare Turnstile: 사이트키가 주입돼 있으면 사람 확인 후 진입, 아니면 바로 시작
    const TS_SITEKEY = "{{TURNSTILE_SITEKEY}}";
    function onTurnstile(token) {
      fetch('/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      }).then(r => r.json()).then(d => { if (d && d.ok) startFeed(); }).catch(() => {});
    }
    if (!TS_SITEKEY) {
      startFeed();
    } else {
      (function initTs() {
        if (window.turnstile) {
          turnstile.render('#ts-widget', { sitekey: TS_SITEKEY, callback: onTurnstile });
        } else {
          setTimeout(initTs, 120);
        }
      })();
    }
  </script>
</body>
</html>
