  <style>
    * { box-sizing: border-box; }
    /* prepend는 대기열(새 자짤 버튼)로만 일어나므로 브라우저 스크롤 앵커링이 불필요하고,
       켜져 있으면 버튼 클릭 후 맨 위로 점프를 되돌려버린다 */
    html { overflow-anchor: none; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 16px;
    }
    header .brand { display: flex; align-items: baseline; min-width: 0; }
    header .logo {
      font-weight: 700;
      font-size: 20px;
    }
    header .subtitle {
      font-size: 13px;
      color: #767676;
      margin-left: 8px;
    }
    header .actions button {
      background: #e60023;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    header .actions { display: flex; align-items: center; gap: 16px; }
    header .actions a {
      color: #333;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }
    header .actions a:hover { color: #e60023; text-decoration: underline; }
    header .actions button:hover { background: #ad001b; }
    header .actions select {
      font: inherit;
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 18px;
      background: #fff;
      color: #333;
      cursor: pointer;
      max-width: 160px;
    }
    header .actions select:focus { outline: 2px solid #e60023; border-color: transparent; }
    header .nav-links { display: flex; align-items: center; gap: 16px; }
    /* .actions button(빨간 알약)보다 구체성이 높아야 ☰가 민무늬로 렌더됨 */
    header .actions button.menu-btn {
      display: none;
      background: none;
      border: none;
      color: #333;
      font-size: 22px;
      padding: 4px 8px;
      cursor: pointer;

    header .actions button.menu-btn:hover { background: none; color: #e60023; }
    #newItemsBtn {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: #e60023;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(230, 0, 35, 0.35);
    }
    #newItemsBtn:hover { background: #ad001b; }
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      header .logo { font-size: 18px; }
      header .subtitle { display: none; }
      header .actions { gap: 10px; }
      header .actions select { max-width: 130px; font-size: 13px; padding: 7px 9px; }
      /* 링크들은 ☰ 드롭다운으로 접어 헤더가 옆으로 늘어나지 않게 함 */

      header .nav-links {
        display: none;

        right: 10px;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 12px;

        font-size: 14px;
        text-align: left;

      header .nav-links a:hover { background: #f5f5f5; text-decoration: none; }
      header .nav-links button {
        background: none;
        color: #e60023;
        font-weight: 700;
      }
      header .nav-links button:hover { background: #f5f5f5; }

    footer {

    .masonry {
      column-count: 5;
      column-gap: 16px;

    }
    @media (max-width: 1200px) { .masonry { column-count: 4; } }
    @media (max-width: 900px)  { .masonry { column-count: 3; } }
    @media (max-width: 600px)  { .masonry { column-count: 2; } }

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
      /* GPU compositing hints: store the rounded white card on its own layer so the
         lift+shadow transition does not flash a white outline. Stable across
         Safari/Chrome/Firefox when combined with translateZ below. */
      will-change: transform;
      transform: translateZ(0);
      -webkit-backface-visibility: hidden;
              backface-visibility: hidden;
    }
    .card:hover {
      /* Use translate3d so the browser keeps the card on the GPU layer it
         pre-allocated (no re-rasterization during the 150ms transition). */
      transform: translate3d(0, -2px, 0);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      height: auto; /* width/height 속성으로 예약된 비율 유지 (로드 전 masonry 뒤틀림 방지) */

    .card .meta {
      padding: 10px 12px;

    .card .meta-right { display: flex; align-items: center; gap: 8px; white-space: nowrap; }

    #lightbox {
      position: fixed;

      z-index: 2000;

      display: flex;
      flex-direction: column;
      align-items: center;

    #lightbox[hidden] { display: none; }
    #lightbox img {

    #lightbox .lb-hint {

    .heart-pop {

    @keyframes heartPop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
      25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
      45%  { transform: translate(-50%,-50%) scale(0.95); }
      70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%,-60%) scale(1); }
    }
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #767676;
    }
    #gate {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #f5f5f5;
      display: flex;

      justify-content: center;

    #gate .gate-box {

    #gate p { color: #767676; margin: 10px 0 22px; }
    #ts-widget { display: flex; justify-content: center; min-height: 65px; }

<body>

    <nav class="actions">
      <select id="galleryFilter" title="갤러리 필터">

  </footer>
  <div id="lightbox" hidden>
    <img alt="원본 이미지" />
    <div class="lb-hint">원본 화질 — 우클릭(길게 눌러)으로 복사·저장 · 클릭하면 닫힘</div>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    const gallery = document.getElementById('gallery');
    const cards = new Map(); // id -> card element (증분 렌더용)

    function timeAgo(epoch) {
      const diff = Math.floor((Date.now() / 1000) - epoch);
      if (diff < 60) return '방금';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return `${Math.floor(diff / 86400)}일 전`;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function makeCard(it) {
      const article = document.createElement('article');
      article.className = 'card';
      article.dataset.createdAt = it.created_at;
      article.dataset.id = it.id;
      const label = it.title || '자짤';
      const likes = it.likes || 0;
      const titleHtml = it.link
        ? `<a class="title" href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`
        : `<span class="title">${escapeHtml(label)}</span>`;
      const heart = localStorage.getItem('liked_' + it.id) ? '♥' : '♡';
      article.dataset.gallery = it.gallery || '';
      // 원본 치수로 로드 전에 자리를 예약 → lazy 이미지가 로드되며 컬럼이 뒤틀리는 것 방지
      const dim = (it.w > 0 && it.h > 0) ? `width="${it.w}" height="${it.h}"` : '';
      // 썸네일 카드는 호버 시 원본으로 교체해 피드에서 바로 복사해도 원본 화질이 되게 함
      if (it.thumb && it.thumb !== it.url) article.dataset.fullSrc = it.url;
      article.innerHTML = `
        <div class="imgwrap">
          <img src="${it.thumb || it.url}" ${dim} alt="${escapeHtml(label)}" loading="lazy" />
        </div>
        <div class="meta">
          ${titleHtml}
          <span class="meta-right">
            <span class="likes"><span class="hi">${heart}</span> <b class="lc">${likes}</b></span>
            <span class="time">${timeAgo(it.created_at)}</span>
          </span>
        </div>`;
      return article;
    }

    function setEmpty(show) {
      const existing = gallery.querySelector('.empty');
      if (show && !existing) {
        gallery.innerHTML = '<div class="empty">아직 업로드된 자짤이 없습니다. 봇이 새 이미지를 수집하기 시작하면 여기에 표시됩니다.</div>';
      } else if (!show && existing) {
        existing.remove();
      }
    }

    // ── 갤러리별 필터 ──
    const filterSel = document.getElementById('galleryFilter');
    let galleryFilter = localStorage.getItem('galleryFilter') || '';

    function applyFilter(el) {
      el.hidden = !!(galleryFilter && el.dataset.gallery !== galleryFilter);
    }

    function updateFilterOptions(items) {
      const known = new Set([...filterSel.options].map(o => o.value));
      for (const g of new Set(items.map(i => i.gallery).filter(Boolean))) {
        if (!known.has(g)) {
          const opt = document.createElement('option');
          opt.value = g;
          opt.textContent = g;
          filterSel.appendChild(opt);
        }
      }
      // 저장된 필터가 옵션에 생기면 선택 상태 복원
      if (galleryFilter && filterSel.value !== galleryFilter &&
          [...filterSel.options].some(o => o.value === galleryFilter)) {
        filterSel.value = galleryFilter;
      }
    }

    filterSel.addEventListener('change', () => {
      galleryFilter = filterSel.value;
      localStorage.setItem('galleryFilter', galleryFilter);
      for (const el of cards.values()) applyFilter(el);
    });

    // ── 새 자짤 대기열 ──
    // 스크롤을 내려 구경 중일 때 새 카드가 끼어들면 masonry 전체가 밀리므로,
    // 위에 있지 않으면 바로 반영하지 않고 모아뒀다가 "새 자짤 N개 ↑" 버튼으로 반영한다.
    const newItemsBtn = document.getElementById('newItemsBtn');
    let pendingItems = []; // 최신순 유지

    function prependItems(list) {
      for (let k = list.length - 1; k >= 0; k--) {
        const el = makeCard(list[k]);
        applyFilter(el);
        gallery.prepend(el);
        cards.set(list[k].id, el);
      }
    }

    function flushPending() {
      if (pendingItems.length) {
        prependItems(pendingItems);
        pendingItems = [];
      }
      newItemsBtn.hidden = true;
    }

    newItemsBtn.addEventListener('click', () => {
      flushPending();
      window.scrollTo(0, 0); // smooth는 이미지 로딩에 밀려 취소될 수 있어 즉시 점프
    });
    // 사용자가 직접 맨 위로 올라오면 자동 반영
    window.addEventListener('scroll', () => {
      if (window.scrollY <= 300 && pendingItems.length) flushPending();
    }, { passive: true });

    function sync(items) {
      const ids = new Set(items.map(i => i.id));
      updateFilterOptions(items);

      // 사라진(만료된) 이미지는 DOM에서 제거 + 대기열에서도 제거
      for (const [id, el] of cards) {
        if (!ids.has(id)) { el.remove(); cards.delete(id); }
      }
      pendingItems = pendingItems.filter(i => ids.has(i.id));

      // 새 이미지 (피드는 최신순 → 오래된 새 항목부터 prepend 하면 최신이 맨 위)
      const pendingIds = new Set(pendingItems.map(i => i.id));
      const fresh = items.filter(i => !cards.has(i.id) && !pendingIds.has(i.id));

      if (cards.size === 0 || window.scrollY <= 300) {
        // 첫 로드거나 위에 있으면 즉시 반영
        prependItems([...fresh, ...pendingItems]);
        pendingItems = [];
        newItemsBtn.hidden = true;
      } else if (fresh.length) {
        pendingItems = [...fresh, ...pendingItems];
        newItemsBtn.textContent = `새 자짤 ${pendingItems.length}개 ↑`;
        newItemsBtn.hidden = false;
      }

      // 기존 카드의 '~분 전' + 좋아요 수 갱신 (다른 사람이 누른 것도 반영, 감소는 안 함)
      const byId = new Map(items.map(i => [i.id, i]));
      for (const [id, el] of cards) {
        const t = el.querySelector('.time');
        if (t) t.textContent = timeAgo(Number(el.dataset.createdAt));
        const lc = el.querySelector('.lc');
        const it = byId.get(id);
        if (lc && it) lc.textContent = Math.max(Number(lc.textContent) || 0, it.likes || 0);
      }

      setEmpty(cards.size === 0);
    }

    function popHeart(card) {
      const wrap = card.querySelector('.imgwrap') || card;
      const h = document.createElement('div');
      h.className = 'heart-pop';
      h.textContent = '❤';
      wrap.appendChild(h);
      setTimeout(() => h.remove(), 800);
    }

    function likeCard(card) {
      popHeart(card);
      const id = card.dataset.id;
      if (!id || localStorage.getItem('liked_' + id)) return; // 이미 누른 이미지는 애니메이션만
      localStorage.setItem('liked_' + id, '1');
      const hi = card.querySelector('.hi');
      if (hi) hi.textContent = '♥';
      const lc = card.querySelector('.lc');
      if (lc) lc.textContent = (Number(lc.textContent) || 0) + 1; // 낙관적 갱신
      fetch('/like/' + encodeURIComponent(id), { method: 'POST' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && lc) lc.textContent = d.likes; })
        .catch(() => {});
    }

    // ── 호버 시 원본으로 교체 ──
    // 복사/저장하려면 어차피 마우스를 이미지 위에 올려야 하므로, 호버하는 순간
    // 백그라운드로 원본을 받아 조용히 교체한다. 우클릭 복사 시점엔 원본 화질.
    // 훑기만 하는 카드는 썸네일 그대로라 전송량 절감은 유지된다.
    gallery.addEventListener('mouseover', e => {
      const card = e.target.closest('.card');
      if (!card || !card.dataset.fullSrc || card.dataset.fullLoaded) return;
      card.dataset.fullLoaded = '1';
      const img = card.querySelector('.imgwrap img');
      if (!img) return;
      const pre = new Image();
      pre.onload = () => { img.src = card.dataset.fullSrc; };
      pre.src = card.dataset.fullSrc;
    });

    // ── 원본 라이트박스 (이미지 클릭 → 원본 화질로 크게, 거기서 복사/저장) ──
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    let openTimer = null; // 더블클릭(좋아요) 판정을 기다렸다가 여는 지연 타이머

    function openLightbox(id) {
      lightboxImg.src = '/static/images/' + encodeURIComponent(id); // 썸네일이 아닌 원본
      lightbox.hidden = false;
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }
    lightbox.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    gallery.addEventListener('click', e => {
      if (!e.target.closest('.imgwrap')) return; // 제목/좋아요 등은 제외, 이미지 영역만
      const card = e.target.closest('.card');
      if (!card || !card.dataset.id) return;
      clearTimeout(openTimer);
      const id = card.dataset.id;
      // 더블클릭이면 likeCard가 이 타이머를 취소하므로 라이트박스는 열리지 않는다
      openTimer = setTimeout(() => openLightbox(id), 350);
    });

    // 더블클릭 / 모바일 더블탭으로 좋아요
    gallery.addEventListener('dblclick', e => {
      const card = e.target.closest('.card');
      if (card) { clearTimeout(openTimer); likeCard(card); }
    });
    let lastTap = 0, lastCard = null;
    gallery.addEventListener('touchend', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const now = Date.now();
      if (now - lastTap < 300 && lastCard === card) {
        e.preventDefault();
        clearTimeout(openTimer);
        likeCard(card);
        lastTap = 0;
      } else { lastTap = now; lastCard = card; }
    });

    async function loadFeed() {
      try {
        const res = await fetch('/feed?limit=200');
        sync(await res.json());
      } catch (e) {
        console.error('feed load failed', e);
      }
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 모바일 ☰ 메뉴 ──
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');
    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      navLinks.classList.toggle('open');
    });
    // 메뉴 밖 클릭 또는 항목 선택 시 닫기
    document.addEventListener('click', e => {
      if (!navLinks.contains(e.target)) navLinks.classList.remove('open');
    });
    navLinks.addEventListener('click', () => navLinks.classList.remove('open'));

    // ── 초기 로드 + 5초마다 증분 갱신 (ephemeral 피드) ──
    let feedStarted = false;
    function startFeed() {
      if (feedStarted) return;
      feedStarted = true;
      const gate = document.getElementById('gate');
      if (gate) gate.remove();
      loadFeed();
      setInterval(loadFeed, 5000);
    }

    // Cloudflare Turnstile: 사이트키가 주입돼 있으면 사람 확인 후 진입, 아니면 바로 시작
    const TS_SITEKEY = "{{TURNSTILE_SITEKEY}}";
    function onTurnstile(token) {
      fetch('/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      }).then(r => r.json()).then(d => { if (d && d.ok) startFeed(); }).catch(() => {});
    }
    if (!TS_SITEKEY) {
      startFeed();
    } else {
      (function initTs() {
        if (window.turnstile) {
          turnstile.render('#ts-widget', { sitekey: TS_SITEKEY, callback: onTurnstile });
        } else {
          setTimeout(initTs, 120);
        }
      })();
    }
  </script>
</body>
</html>
