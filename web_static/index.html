    /* CSS 다단 컬럼 대신 JS가 컬럼(.mcol)에 직접 분배하는 masonry.
       사파리(WebKit)의 multicol+transform 배치 버그를 원천 회피하고,
       최신 짤이 왼쪽 컬럼이 아니라 화면 상단 가로줄에 깔리게 된다. */

      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
      /* GPU compositing hints: store the rounded white card on its own layer so the
         lift+shadow transition does not flash a white outline. Stable across
         Safari/Chrome/Firefox when combined with translateZ below. */
      will-change: transform;
      transform: translateZ(0);
      -webkit-backface-visibility: hidden;
              backface-visibility: hidden;
    }
    .card:hover {
      /* Use translate3d so the browser keeps the card on the GPU layer it
         pre-allocated (no re-rasterization during the 150ms transition). */
      transform: translate3d(0, -2px, 0);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    const gallery = document.getElementById('gallery');
    const cards = new Map(); // id -> card element (증분 렌더용)
    let displayOrder = [];   // 화면에 배치된 카드 id, 최신순

    // ── JS masonry ──
    // CSS 다단 컬럼은 사파리(WebKit)에서 transform 있는 카드의 배치가 어긋나는
    // 버그가 있어, 카드를 "가장 짧은 컬럼"에 직접 분배한다. w/h 메타로 높이를
    // 예측하므로 이미지 로딩 전에도 배치가 확정적이다.
    function colCount() {
      const w = window.innerWidth;
      return w <= 600 ? 2 : w <= 900 ? 3 : w <= 1200 ? 4 : 5;
    }

    function rebuildLayout() {
      const n = colCount();
      const cols = [], heights = [];
      const frag = document.createDocumentFragment();
      for (let i = 0; i < n; i++) {
        const c = document.createElement('div');
        c.className = 'mcol';
        cols.push(c); heights.push(0); frag.appendChild(c);
      }
      const colW = Math.max(1, (gallery.clientWidth - 48 - 16 * (n - 1)) / n);
      for (const id of displayOrder) {
        const el = cards.get(id);
        if (!el) continue;
        let k = 0;
        for (let i = 1; i < n; i++) if (heights[i] < heights[k]) k = i;
        cols[k].appendChild(el); // 기존 노드 이동이라 이미지 재로딩 없음
        if (!el.hidden) heights[k] += colW * (Number(el.dataset.ratio) || 1) + 62; // 62≈메타줄+여백
      }
      gallery.replaceChildren(frag);
    }

    let lastColCount = colCount();
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (colCount() !== lastColCount) { lastColCount = colCount(); rebuildLayout(); }
      }, 150);
    });

    function timeAgo(epoch) {
      const diff = Math.floor((Date.now() / 1000) - epoch);
      if (diff < 60) return '방금';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return `${Math.floor(diff / 86400)}일 전`;
    }

    // 상대 경로(/static/…) 또는 http(s) URL만 허용. 그 외(javascript: 등)는 빈 문자열.
    function safeUrl(u) {
      if (typeof u !== 'string' || !u) return '';
      if (u[0] === '/' && u[1] !== '/') return u;          // 우리 서버의 상대 경로
      return /^https?:\/\//i.test(u) ? u : '';
    }

    function makeCard(it) {
      // 제목·링크·이미지 URL은 dcinside 게시글에서 오는 신뢰 불가 입력이므로,
      // innerHTML 문자열 조립 대신 DOM API(textContent/프로퍼티)로 넣어 속성/스크립트 주입을 원천 차단한다.
      const article = document.createElement('article');
      article.className = 'card';
      article.dataset.createdAt = it.created_at;
      article.dataset.id = it.id;
      article.dataset.gallery = it.gallery || '';
      article.dataset.ratio = (it.w > 0 && it.h > 0) ? (it.h / it.w) : 1; // masonry 높이 예측용
      const label = it.title || '자짤';
      const likes = it.likes || 0;
      const src = safeUrl(it.thumb || it.url);
      const full = safeUrl(it.url);
      if (src !== full && full) article.dataset.fullSrc = full; // 호버 시 원본 교체용

      const imgwrap = document.createElement('div');
      imgwrap.className = 'imgwrap';
      const img = document.createElement('img');
      img.src = src;
      img.alt = label;                 // 프로퍼티 할당 → 속성 탈출 불가
      img.loading = 'lazy';
      img.decoding = 'async';  // 디코딩을 메인스레드 밖에서 → 스크롤 부드러움
      if (it.w > 0 && it.h > 0) { img.width = it.w; img.height = it.h; }
      imgwrap.appendChild(img);

      const meta = document.createElement('div');
      meta.className = 'meta';
      let titleEl;
      const safeLink = safeUrl(it.link);
      if (safeLink) {
        titleEl = document.createElement('a');
        titleEl.href = safeLink;
        titleEl.target = '_blank';
        titleEl.rel = 'noopener noreferrer';
      } else {
        titleEl = document.createElement('span');
      }
      titleEl.className = 'title';
      titleEl.textContent = label;      // 텍스트 노드 → HTML/스크립트 주입 불가

      const right = document.createElement('span');
      right.className = 'meta-right';
      const likesEl = document.createElement('span');
      likesEl.className = 'likes';
      const hi = document.createElement('span');
      hi.className = 'hi';
      hi.textContent = localStorage.getItem('liked_' + it.id) ? '♥' : '♡';
      const lc = document.createElement('b');
      lc.className = 'lc';
      lc.textContent = String(likes);
      likesEl.append(hi, ' ', lc);
      const timeEl = document.createElement('span');
      timeEl.className = 'time';
      timeEl.textContent = timeAgo(it.created_at);
      right.append(likesEl, timeEl);

      meta.append(titleEl, right);
      article.append(imgwrap, meta);
      return article;
    }

    function setEmpty(show) {
      const existing = gallery.querySelector('.empty');
      if (show && !existing) {
        gallery.innerHTML = '<div class="empty">아직 업로드된 자짤이 없습니다. 봇이 새 이미지를 수집하기 시작하면 여기에 표시됩니다.</div>';
      } else if (!show && existing) {
        existing.remove();
      }
    }

    // ── 갤러리 소스 필터 (디시인사이드 / 아카라이브) ──
    let sourceFilter = localStorage.getItem('sourceFilter') || 'dcinside';
    const sourceButtons = document.querySelectorAll('#sourceToggle button');

    function isArca(galleryName) { return galleryName && galleryName.startsWith('arca_'); }

    function applyFilter(el) {
      const g = el.dataset.gallery || '';
      if (sourceFilter === '') { el.hidden = false; return; }
      if (sourceFilter === 'arcalive') { el.hidden = !isArca(g); return; }
      // dcinside: arca_ 접두사가 아닌 모든 갤러리 (빈 값 포함)
      el.hidden = isArca(g);
    }

    function setSourceFilter(value) {
      sourceFilter = value;
      localStorage.setItem('sourceFilter', sourceFilter);
      for (const btn of sourceButtons) {
        btn.classList.toggle('active', btn.value === value);
      }
      for (const el of cards.values()) applyFilter(el);
      rebuildLayout(); // 보이는 카드만으로 컬럼 높이 재분배
    }

    sourceButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.value === sourceFilter) return;
        setSourceFilter(btn.value);
      });
    });

    // 초기 상태 복원
    setSourceFilter(sourceFilter);

    // ── 새 자짤 대기열 ──
    // 스크롤을 내려 구경 중일 때 새 카드가 끼어들면 masonry 전체가 밀리므로,
    // 위에 있지 않으면 바로 반영하지 않고 모아뒀다가 "새 자짤 N개 ↑" 버튼으로 반영한다.
    const newItemsBtn = document.getElementById('newItemsBtn');
    let pendingItems = []; // 최신순 유지

    function prependItems(list) {
      if (!list.length) return;
      for (const it of list) {
        if (cards.has(it.id)) continue;
        const el = makeCard(it);
        applyFilter(el);
        cards.set(it.id, el);
      }
      displayOrder = [...list.map(i => i.id), ...displayOrder]; // 최신순 유지
      rebuildLayout(); // 최신 카드가 각 컬럼 상단(화면 상단 가로줄)에 깔림
    }

    function flushPending() {
      if (pendingItems.length) {
        prependItems(pendingItems);
        pendingItems = [];
      }
      newItemsBtn.hidden = true;
    }

    newItemsBtn.addEventListener('click', () => {
      flushPending();
      window.scrollTo(0, 0); // smooth는 이미지 로딩에 밀려 취소될 수 있어 즉시 점프
    });
    // 사용자가 직접 맨 위로 올라오면 자동 반영
    window.addEventListener('scroll', () => {
      if (window.scrollY <= 300 && pendingItems.length) flushPending();
    }, { passive: true });

    function sync(items) {
      const ids = new Set(items.map(i => i.id));

      // 사라진(만료된) 이미지는 DOM에서 제거 + 대기열/배치 순서에서도 제거
      for (const [id, el] of cards) {
        if (!ids.has(id)) { el.remove(); cards.delete(id); }
      }
      displayOrder = displayOrder.filter(id => cards.has(id));
      pendingItems = pendingItems.filter(i => ids.has(i.id));

      // 새 이미지 (피드는 최신순 → 오래된 새 항목부터 prepend 하면 최신이 맨 위)
      const pendingIds = new Set(pendingItems.map(i => i.id));
      const fresh = items.filter(i => !cards.has(i.id) && !pendingIds.has(i.id));

      if (cards.size === 0 || window.scrollY <= 300) {
        // 첫 로드거나 위에 있으면 즉시 반영
        prependItems([...fresh, ...pendingItems]);
        pendingItems = [];
        newItemsBtn.hidden = true;
      } else if (fresh.length) {
        pendingItems = [...fresh, ...pendingItems];
        newItemsBtn.textContent = `새 자짤 ${pendingItems.length}개 ↑`;
        newItemsBtn.hidden = false;
      }

      // 기존 카드의 '~분 전' + 좋아요 수 갱신 (다른 사람이 누른 것도 반영, 감소는 안 함)
      const byId = new Map(items.map(i => [i.id, i]));
      for (const [id, el] of cards) {
        const t = el.querySelector('.time');
        if (t) t.textContent = timeAgo(Number(el.dataset.createdAt));
        const lc = el.querySelector('.lc');
        const it = byId.get(id);
        if (lc && it) lc.textContent = Math.max(Number(lc.textContent) || 0, it.likes || 0);
      }

      setEmpty(cards.size === 0);
    }

    function popHeart(card) {
      const wrap = card.querySelector('.imgwrap') || card;
      const h = document.createElement('div');
      h.className = 'heart-pop';
      h.textContent = '❤';
      wrap.appendChild(h);
      setTimeout(() => h.remove(), 800);
    }

    function likeCard(card) {
      popHeart(card);
      const id = card.dataset.id;
      if (!id || localStorage.getItem('liked_' + id)) return; // 이미 누른 이미지는 애니메이션만
      localStorage.setItem('liked_' + id, '1');
      const hi = card.querySelector('.hi');
      if (hi) hi.textContent = '♥';
      const lc = card.querySelector('.lc');
      if (lc) lc.textContent = (Number(lc.textContent) || 0) + 1; // 낙관적 갱신
      fetch('/like/' + encodeURIComponent(id), { method: 'POST' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (d && lc) lc.textContent = d.likes; })
        .catch(() => {});
    }

    // ── 호버 시 원본으로 교체 ──
    // 복사/저장하려면 어차피 마우스를 이미지 위에 올려야 하므로, 호버하는 순간
    // 백그라운드로 원본을 받아 조용히 교체한다. 우클릭 복사 시점엔 원본 화질.
    // 훑기만 하는 카드는 썸네일 그대로라 전송량 절감은 유지된다.
    gallery.addEventListener('mouseover', e => {
      const card = e.target.closest('.card');
      if (!card || !card.dataset.fullSrc || card.dataset.fullLoaded) return;
      card.dataset.fullLoaded = '1';
      const img = card.querySelector('.imgwrap img');
      if (!img) return;
      const pre = new Image();
      pre.onload = () => { img.src = card.dataset.fullSrc; };
      pre.src = card.dataset.fullSrc;
    });

    // ── 원본 라이트박스 (이미지 클릭 → 원본 화질로 크게, 거기서 복사/저장) ──
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    let openTimer = null; // 더블클릭(좋아요) 판정을 기다렸다가 여는 지연 타이머

    function openLightbox(id) {
      lightboxImg.src = '/static/images/' + encodeURIComponent(id); // 썸네일이 아닌 원본
      lightbox.hidden = false;
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }
    lightbox.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    gallery.addEventListener('click', e => {
      if (!e.target.closest('.imgwrap')) return; // 제목/좋아요 등은 제외, 이미지 영역만
      const card = e.target.closest('.card');
      if (!card || !card.dataset.id) return;
      clearTimeout(openTimer);
      const id = card.dataset.id;
      // 더블클릭이면 likeCard가 이 타이머를 취소하므로 라이트박스는 열리지 않는다
      openTimer = setTimeout(() => openLightbox(id), 350);
    });

    // 더블클릭 / 모바일 더블탭으로 좋아요
    gallery.addEventListener('dblclick', e => {
      const card = e.target.closest('.card');
      if (card) { clearTimeout(openTimer); likeCard(card); }
    });
    let lastTap = 0, lastCard = null;
    gallery.addEventListener('touchend', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const now = Date.now();
      if (now - lastTap < 300 && lastCard === card) {
        e.preventDefault();
        clearTimeout(openTimer);
        likeCard(card);
        lastTap = 0;
      } else { lastTap = now; lastCard = card; }
    });

    async function loadFeed() {
      try {
        const res = await fetch('/feed?limit=200');
        sync(await res.json());
      } catch (e) {
        console.error('feed load failed', e);
      }
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 모바일 ☰ 메뉴 ──
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');
    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      navLinks.classList.toggle('open');
    });
    // 메뉴 밖 클릭 또는 항목 선택 시 닫기
    document.addEventListener('click', e => {
      if (!navLinks.contains(e.target)) navLinks.classList.remove('open');
    });
    navLinks.addEventListener('click', () => navLinks.classList.remove('open'));

    // ── 초기 로드 + 5초마다 증분 갱신 (ephemeral 피드) ──
    let feedStarted = false;
    function startFeed() {
      if (feedStarted) return;
      feedStarted = true;
      const gate = document.getElementById('gate');
      if (gate) gate.remove();
      loadFeed();
      setInterval(loadFeed, 5000);
    }

    // Cloudflare Turnstile: 사이트키가 주입돼 있으면 사람 확인 후 진입, 아니면 바로 시작
    const TS_SITEKEY = "{{TURNSTILE_SITEKEY}}";
    function onTurnstile(token) {
      fetch('/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      }).then(r => r.json()).then(d => { if (d && d.ok) startFeed(); }).catch(() => {});
    }
    if (!TS_SITEKEY) {
      startFeed();
    } else {
      (function initTs() {
        if (window.turnstile) {
          turnstile.render('#ts-widget', { sitekey: TS_SITEKEY, callback: onTurnstile });
        } else {
          setTimeout(initTs, 120);
        }
      })();
    }
  </script>
</body>
</html>
