<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자짤 갤러리 · dcselfie</title>
  <meta name="description" content="DCInside 갤러리에서 모은 자짤(셀카·짤방)을 실시간으로 보여주는 핀터레스트형 피드. 일정 시간이 지나면 자동으로 사라집니다." />

  <!-- Google AdSense - 심사 통과 후 발급받은 ca-pub-XXXX 로 교체하세요.
       (AdSense 가입 → 사이트 등록 → 아래 client 값을 본인 퍼블리셔 ID로) -->
  <!--
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
          crossorigin="anonymous"></script>
  -->
  <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXX" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-weight: 700;
      font-size: 20px;
    }
    header .subtitle {
      font-size: 13px;
      color: #767676;
      margin-left: 8px;
    }
    header .actions button {
      background: #e60023;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    header .actions { display: flex; align-items: center; gap: 16px; }
    header .actions a {
      color: #333;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    header .actions a:hover { color: #e60023; text-decoration: underline; }
    header .actions button:hover { background: #ad001b; }
    footer {
      text-align: center;
      padding: 28px 24px 40px;
      color: #767676;
      font-size: 13px;
    }
    footer a { color: #767676; text-decoration: none; }
    footer a:hover { color: #e60023; text-decoration: underline; }
    footer span { margin: 0 6px; }
    .masonry {
      column-count: 5;
      column-gap: 16px;
      padding: 16px 24px;
    }
    @media (max-width: 1200px) { .masonry { column-count: 4; } }
    @media (max-width: 900px)  { .masonry { column-count: 3; } }
    @media (max-width: 600px)  { .masonry { column-count: 2; } }

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      display: block;
    }
    .card .meta {
      padding: 10px 12px;
      font-size: 13px;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card .meta .time {
      color: #767676;
      font-size: 12px;
      white-space: nowrap;
      margin-left: 8px;
    }
    .card .meta .title {
      color: #111;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card .meta .title:hover { text-decoration: underline; color: #e60023; }
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #767676;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <span class="logo">자짤 갤러리</span>
      <span class="subtitle">DCInside 자짤 피드</span>
    </div>
    <nav class="actions">
      <a href="/about">소개</a>
      <a href="/privacy">개인정보처리방침</a>
      <button onclick="scrollToTop()">맨 위로</button>
    </nav>
  </header>
  <main id="gallery" class="masonry"></main>
  <footer>
    <a href="/about">소개</a>
    <span>·</span>
    <a href="/privacy">개인정보처리방침</a>
    <span>·</span>
    <span>© <span id="year"></span> dcselfie.win</span>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    const gallery = document.getElementById('gallery');
    const cards = new Map(); // id -> card element (증분 렌더용)

    function timeAgo(epoch) {
      const diff = Math.floor((Date.now() / 1000) - epoch);
      if (diff < 60) return '방금';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return `${Math.floor(diff / 86400)}일 전`;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function makeCard(it) {
      const article = document.createElement('article');
      article.className = 'card';
      article.dataset.createdAt = it.created_at;
      const label = it.title || '자짤';
      const titleHtml = it.link
        ? `<a class="title" href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`
        : `<span>${escapeHtml(label)}</span>`;
      article.innerHTML = `
        <img src="${it.url}" alt="${escapeHtml(label)}" loading="lazy" />
        <div class="meta">
          ${titleHtml}
          <span class="time">${timeAgo(it.created_at)}</span>
        </div>`;
      return article;
    }

    function setEmpty(show) {
      const existing = gallery.querySelector('.empty');
      if (show && !existing) {
        gallery.innerHTML = '<div class="empty">아직 업로드된 자짤이 없습니다. 봇이 새 이미지를 수집하기 시작하면 여기에 표시됩니다.</div>';
      } else if (!show && existing) {
        existing.remove();
      }
    }

    function sync(items) {
      const ids = new Set(items.map(i => i.id));

      // 사라진(만료된) 이미지는 DOM에서 제거
      for (const [id, el] of cards) {
        if (!ids.has(id)) { el.remove(); cards.delete(id); }
      }

      // 새 이미지만 추가 (피드는 최신순 → 오래된 새 항목부터 prepend 하면 최신이 맨 위)
      const fresh = items.filter(i => !cards.has(i.id));
      for (let k = fresh.length - 1; k >= 0; k--) {
        const el = makeCard(fresh[k]);
        gallery.prepend(el);
        cards.set(fresh[k].id, el);
      }

      // 기존 카드의 '~분 전' 표시 갱신
      for (const el of cards.values()) {
        const t = el.querySelector('.time');
        if (t) t.textContent = timeAgo(Number(el.dataset.createdAt));
      }

      setEmpty(cards.size === 0);
    }

    async function loadFeed() {
      try {
        const res = await fetch('/feed?limit=200');
        sync(await res.json());
      } catch (e) {
        console.error('feed load failed', e);
      }
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 초기 로드 + 5초마다 증분 갱신 (ephemeral 피드 → TTL 경과 시 자동 삭제)
    loadFeed();
    setInterval(loadFeed, 5000);
  </script>
</body>
</html>
