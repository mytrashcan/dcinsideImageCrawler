<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>갤러리 추가 요청 · 자짤 갤러리</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CTFS40BCB7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-CTFS40BCB7');
  </script>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4317936564749286"
          crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-4317936564749286" />
  <style>
    body { margin: 0; background: #f5f5f5; color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .wrap { max-width: 620px; margin: 0 auto; padding: 40px 24px 80px; }
    a.home { color: #e60023; text-decoration: none; font-weight: 600; }
    h1 { font-size: 26px; }
    p, label { line-height: 1.7; color: #333; }
    form { margin-top: 24px; display: flex; flex-direction: column; gap: 16px; }
    label { display: flex; flex-direction: column; gap: 6px; font-weight: 600; font-size: 14px; }
    input, textarea {
      font: inherit; padding: 10px 12px; border: 1px solid #ccc; border-radius: 10px; background: #fff;
    }
    input:focus, textarea:focus { outline: 2px solid #e60023; border-color: transparent; }
    textarea { min-height: 90px; resize: vertical; }
    button {
      background: #e60023; color: #fff; border: none; padding: 12px 18px; border-radius: 24px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #ad001b; }
    .hint { color: #767676; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a class="home" href="/">← 갤러리로</a></p>
    <h1>갤러리 추가 요청</h1>
    <p>피드에 추가했으면 하는 DCInside · 아카라이브 갤러리가 있으면 알려주세요. 아래를 채우고 보내면
       운영자 메일로 전달됩니다.</p>

    <form id="reqForm">
      <label>갤러리 이름 <span style="color:#e60023">*</span>
        <input id="gname" placeholder="예: 스타레일 갤러리" required />
      </label>
      <label>갤러리 주소 (URL)
        <input id="gurl" type="url" placeholder="https://gall.dcinside.com/... 또는 https://arca.live/b/..." />
      </label>
      <label>남길 말 (선택)
        <textarea id="gmsg" placeholder="추가 사유나 하고 싶은 말"></textarea>
      </label>
      <button type="submit">메일로 요청 보내기</button>
      <p class="hint">버튼을 누르면 메일 앱이 열리며 내용이 자동으로 채워집니다.
        잘 안 되면 <a href="mailto:hnnmonsta@gmail.com">hnnmonsta@gmail.com</a> 로 직접 보내주세요.</p>
    </form>
  </div>

  <script>
    document.getElementById('reqForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const name = document.getElementById('gname').value.trim();
      const url = document.getElementById('gurl').value.trim();
      const msg = document.getElementById('gmsg').value.trim();
      const subject = `[갤러리 추가 요청] ${name}`;
      const body =
        `갤러리 이름: ${name}\n` +
        `갤러리 주소: ${url || '(미입력)'}\n\n` +
        `${msg || ''}\n\n— dcselfie.win 에서 보냄`;
      window.location.href =
        `mailto:hnnmonsta@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    });
  </script>
</body>
</html>
